services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gymtracker
      POSTGRES_PASSWORD: gymtracker_secret
      POSTGRES_DB: gymtracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gymtracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: gymtracker
      MINIO_ROOT_PASSWORD: gymtracker_secret
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+asyncpg://gymtracker:gymtracker_secret@db:5432/gymtracker
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      STORAGE_BACKEND: s3
      S3_BUCKET: gymtracker-media
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: gymtracker
      S3_SECRET_KEY: gymtracker_secret
      MEDIA_BASE_URL: http://localhost:9000/gymtracker-media
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && python3 -c 'import boto3; c=boto3.client(\"s3\", endpoint_url=\"http://minio:9000\", aws_access_key_id=\"gymtracker\", aws_secret_access_key=\"gymtracker_secret\"); c.create_bucket(Bucket=\"gymtracker-media\")' 2>/dev/null; uvicorn src.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
  minio_data:
