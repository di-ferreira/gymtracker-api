version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8001:8000"
    environment:
      ENVIRONMENT: development
      DATABASE_URL: sqlite+aiosqlite:///./gymtracker.db
      SECRET_KEY: dev-secret-key
    volumes:
      - .:/app
    command: uvicorn src.main:app --reload --host 0.0.0.0 --port 8000
